<div class="container-fluid" [class.disabled-content]="isDashboardLoading">
  <div class="stats-grid" *ngIf="!isDashboardLoading">
    <mat-card class="stat-card total">
        <mat-card-content>
            <div class="stat-icon"><mat-icon>payments</mat-icon></div>
            <div class="stat-info">
                <span class="label">Total Confirmed Sales</span>
                <span class="value">₹{{totalSalesAmount | number:'1.2-2'}}</span>
            </div>
        </mat-card-content>
    </mat-card>

    <mat-card class="stat-card overdue">
        <mat-card-content>
            <div class="stat-icon"><mat-icon>local_shipping</mat-icon></div>
            <div class="stat-info">
                <span class="label">Pending Dispatch</span>
                <span class="value">{{pendingDispatchCount}}</span>
            </div>
            <div class="stat-badge" *ngIf="pendingDispatchCount > 0">Action Required</div>
        </mat-card-content>
    </mat-card>

    <mat-card class="stat-card active">
        <mat-card-content>
            <div class="stat-icon"><mat-icon>pending_actions</mat-icon></div>
            <div class="stat-info">
                <span class="label">Unpaid/Partial</span>
                <span class="value">{{unpaidOrdersCount}}</span>
            </div>
        </mat-card-content>
    </mat-card>
  </div>

  <div class="header-actions">
    <h3 class="page-title">Sale Order Management</h3>
    <div class="d-flex gap-2">
      <!-- Bulk Outward Button -->
      <button mat-raised-button color="primary" class="main-add-btn" 
              (click)="bulkCreateGatePass()" 
              [disabled]="isLoading"
              *ngIf="canShowBulkDispatch">
        <mat-icon>local_shipping</mat-icon>
        Bulk Outward
      </button>

      <!-- Bulk Collect Payment Button -->
      <button mat-raised-button color="primary" class="main-add-btn success-btn" 
              (click)="bulkCollectPayment()" 
              [disabled]="isLoading"
              *ngIf="canShowBulkPayment">
        <mat-icon>payments</mat-icon>
        Bulk Collect Payment
      </button>

    </div>
  </div>

  <div class="mat-elevation-z8 responsive-table-container">
    <div class="loading-overlay" *ngIf="isLoading && !isDashboardLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- Hierarchical Grid Component -->
    <app-enterprise-hierarchical-grid
      [addNewLabel]="'New Sale Order'"
      [addNewRoute]="'/app/inventory/solist/add'"
      [columns]="soColumns"
      [childColumns]="itemColumns"
      [showApprovalWorkflow]="false"
      [dataSource]="dataSource"
      [totalRecords]="totalRecords"
      [pageSize]="10"
      [isLoading]="isLoading"
      [childDataField]="'items'"
      [userRole]="userRole"
      [highlightedId]="highlightedSoId"
      [canAdd]="canAdd"
      [canEdit]="canEdit"
      [canDelete]="canDelete"
      [showSimpleActions]="true"
      [entityName]="'Sale Order'"
      [showBulkConfirm]="true"
      (onGridStateChange)="onGridStateChange($event)"
      (deleteRecord)="onDeleteSingleRecord($event)"
      (selectionChanged)="onGridSelectionChange($event)"
      (actionClicked)="handleGridAction($event)"
      (rowExpanded)="onRowExpanded($event)"
      (bulkDeleteParentOrders)="onBulkDeleteGrid($event)"
      (bulkConfirmOrders)="onBulkConfirmGrid($event)">
    </app-enterprise-hierarchical-grid>
  </div>
</div>
